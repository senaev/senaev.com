name: Deploy App

on:
  push:
    # ❗️ Remove "automate-deploy" branch after testing.
    branches: [main, master, automate-deploy]
  workflow_dispatch: # Allow manual run from Actions tab

env:
  IMAGE_NAME: senaev.com
  REGISTRY_IMAGE: ghcr.io/senaev/senaev.com:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restart deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          script: |
            set -e
            kubectl -n senaev-com rollout restart deployment/nextjs-app
            kubectl -n senaev-com rollout status deployment/nextjs-app --timeout=180s
