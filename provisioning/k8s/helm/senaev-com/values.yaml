namespace: senaev-com

userRootPath: /root

nextjs:
  enabled: true
  image: ghcr.io/senaev/senaev.com:latest
  replicas: 1

traefik:
  enabled: true
  image: traefik:v3.2
  acme:
    email: andrei.senaev@gmail.com
  acmePath: k3s-cluster/volumes/traefik-acme
  logLevel: INFO

webdav:
  enabled: true
  image:
    repository: bytemark/webdav
  path: k3s-cluster/volumes/webdav

xray:
  enabled: true
  image: teddysun/xray:latest

testEcho:
  enabled: true
  image: hashicorp/http-echo:0.2.3

ingress:
  className: traefik
  tls:
    certResolver: letsencrypt
    hosts:
      - senaev.com
      - senaev.ru
      - grafana.senaev.com
      - webdav.senaev.com
      - test.senaev.com
  hosts:
    - host: senaev.com
      service: nextjs-app
      port: 3000
    - host: senaev.ru
      service: nextjs-app
      port: 3000
    - host: grafana.senaev.com
      service: grafana
      port: 3000
    - host: webdav.senaev.com
      service: webdav
      port: 80
    - host: test.senaev.com
      service: test-echo
      port: 80

traefikAcmeStorageSize: 100Mi
