# ❗️ Remove duplications using helmfile
userRootPath: /root

nextjs:
  enabled: true
  image: ghcr.io/senaev/senaev.com:latest
  replicas: 1

webdav:
  enabled: true
  image:
    repository: bytemark/webdav
  path: k3s-cluster/volumes/webdav

xray:
  enabled: true
  image: teddysun/xray:latest

testEcho:
  enabled: true
  image: hashicorp/http-echo:0.2.3

ingress:
  className: traefik
  tls:
    hosts:
      - senaev.com
      - senaev.ru
      - webdav.senaev.com
      - test.senaev.com
  hosts:
    - host: senaev.com
      service: nextjs-app
      port: 3000
    - host: senaev.ru
      service: nextjs-app
      port: 3000
    - host: webdav.senaev.com
      service: webdav
      port: 80
    - host: test.senaev.com
      service: test-echo
      port: 80

