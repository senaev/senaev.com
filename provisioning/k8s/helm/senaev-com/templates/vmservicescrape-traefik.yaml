# VMServiceScrape for Traefik metrics (VMAgent from victoria-metrics-k8s-stack discovers this)
{{- if .Values.traefik.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: traefik
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: traefik
  endpoints:
    - port: traefik
      path: /metrics
{{- end }}
