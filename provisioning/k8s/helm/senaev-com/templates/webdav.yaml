{{- if .Values.webdav.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webdav-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 5s
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: webdav-secrets
    creationPolicy: Owner
  data:
    - secretKey: WEBDAV_PASSWORD
      remoteRef:
        key: webdav
        property: WEBDAV_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webdav
  namespace: {{ .Release.Namespace }}
  labels:
    app: webdav
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webdav
  template:
    metadata:
      labels:
        app: webdav
    spec:
      initContainers:
        - name: wait-for-webdav-secret
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for webdav-secrets (WEBDAV_PASSWORD)..."
              NAMESPACE=$$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              TOKEN=$$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              until wget -q -O- --header="Authorization: Bearer $$TOKEN" --ca-certificate="$$CA" "https://kubernetes.default.svc/api/v1/namespaces/$$NAMESPACE/secrets/webdav-secrets" 2>/dev/null | grep -q '"WEBDAV_PASSWORD"'; do
                echo "⏳ [$$(date '+%Y-%m-%dT%H:%M:%S')] Secret not ready, retrying in 1s..."
                sleep 1
              done
              echo "✅ Secret webdav-secrets with WEBDAV_PASSWORD is ready"
      containers:
        - name: webdav
          image: {{ .Values.webdav.image.repository }}
          env:
            - name: AUTH_TYPE
              value: Digest
            - name: USERNAME
              value: webdav_admin
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webdav-secrets
                  key: WEBDAV_PASSWORD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/lib/dav
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.userRootPath }}/{{ .Values.webdav.path }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: webdav
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: webdav
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
{{- end }}
