{{- if .Values.webdav.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: senaev-com-kv-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 5s
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: senaev-com-kv-secrets
    creationPolicy: Owner
  data:
    - secretKey: WEBDAV_PASSWORD
      remoteRef:
        key: senaev-com-kv
        property: WEBDAV_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webdav
  namespace: {{ .Release.Namespace }}
  labels:
    app: webdav
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webdav
  template:
    metadata:
      labels:
        app: webdav
    spec:
      initContainers:
        - name: wait-for-webdav-secret
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for senaev-com-kv-secrets.WEBDAV_PASSWORD on pod..."
              until [ -f /var/run/secrets/eso-secrets-folder/WEBDAV_PASSWORD ]; do
                echo "⏳ [$$(date '+%Y-%m-%dT%H:%M:%S')] Secret not ready, retrying in 1s..."
                sleep 1
              done
              echo "✅ WEBDAV_PASSWORD is ready"
          volumeMounts:
            - name: senaev-com-kv-secrets-volume
              mountPath: /var/run/secrets/eso-secrets-folder
              readOnly: true
      containers:
        - name: webdav
          image: {{ .Values.webdav.image.repository }}
          env:
            - name: AUTH_TYPE
              value: Digest
            - name: USERNAME
              value: webdav_admin
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: senaev-com-kv-secrets
                  key: WEBDAV_PASSWORD
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/lib/dav
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.userRootPath }}/{{ .Values.webdav.path }}
            type: DirectoryOrCreate
        - name: senaev-com-kv-secrets-volume
          secret:
            secretName: senaev-com-kv-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: webdav
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: webdav
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
{{- end }}
