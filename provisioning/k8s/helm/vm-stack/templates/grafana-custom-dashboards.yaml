# ConfigMaps with label grafana_dashboard="1" are loaded by the victoria-metrics-k8s-stack
# Grafana sidecar and appear alongside the stock dashboards.
# One ConfigMap per file to avoid YAML parse issues with embedded multi-line JSON.
{{- $root := . }}
{{- $files := .Files.Glob "files/dashboards/*.json" }}
{{- if $files }}
{{- range $path, $_ := $files }}
{{- $name := base $path }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name | replace ".json" "" }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  {{ $name }}: |
{{ $root.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
