vaultAuth:
  serviceAccountName: vault-sa

ingress:
  enabled: true
  host: vault.senaev.com
  className: traefik
  tls:
    certResolver: letsencrypt

external-secrets:
  installCRDs: true

vault:
  fullnameOverride: "vault"

  injector:
    enabled: false

  server:
    serviceAccount:
      create: true
      name: vault-sa
    standalone:
      enabled: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = true
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "file" {
          path = "/vault/data"
        }
        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

    service:
      enabled: true

    dataStorage:
      enabled: true
      size: 10Gi
